name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/ontime-se-g/ontime-frontend/admin-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Kubernetes
        uses: tale/kubectl-action@v1
        with:
          base64-kube-config: ${{ secrets.KUBE_CONFIG }}
      - run: |
          kubectl set image deployment/admin-web \
            admin-web=${{ env.IMAGE }}:${{ github.sha }} \
            -n transit-platform
          kubectl rollout status deployment/admin-web -n transit-platform --timeout=120s
